<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <style>
    .box { fill: #ffffff; stroke: #222222; stroke-width: 2; }
    .label { fill: #111111; font-size: 15px; }
    .small { fill: #333333; font-size: 12px; }
    .title { fill: #111111; font-size: 16px; font-weight: bold; }
    .wire { stroke: #222222; stroke-width: 2; fill: none; }
  </style>

  <rect x="20" y="20" width="230" height="360" class="box"/>
  <rect x="280" y="20" width="600" height="360" class="box"/>

  <text x="60" y="395" class="title">POWER SECTION</text>
  <text x="500" y="395" class="title">RECEIVER SECTION</text>

  <!-- POWER SECTION (identical to transmitter) -->
  <rect x="60" y="70" width="130" height="90" class="box"/>
  <text x="90" y="100" class="label">LM 7805</text>
  <text x="70" y="140" class="small">VIN</text>
  <text x="115" y="140" class="small">GND</text>
  <text x="160" y="140" class="small">VOUT</text>

  <line x1="60" y1="220" x2="60" y2="260" class="wire"/>
  <line x1="45" y1="225" x2="75" y2="225" class="wire" stroke-width="4"/>
  <line x1="50" y1="235" x2="70" y2="235" class="wire" stroke-width="2"/>
  <line x1="45" y1="245" x2="75" y2="245" class="wire" stroke-width="4"/>
  <line x1="50" y1="255" x2="70" y2="255" class="wire" stroke-width="2"/>
  <text x="85" y="245" class="small">9V</text>
  <line x1="60" y1="160" x2="60" y2="225" class="wire"/>
  <line x1="60" y1="255" x2="60" y2="300" class="wire"/>
  <line x1="60" y1="300" x2="125" y2="300" class="wire"/>
  <line x1="125" y1="300" x2="125" y2="160" class="wire"/>

  <line x1="60" y1="300" x2="60" y2="320" class="wire"/>
  <line x1="45" y1="320" x2="75" y2="320" class="wire"/>
  <line x1="50" y1="326" x2="70" y2="326" class="wire"/>
  <line x1="55" y1="332" x2="65" y2="332" class="wire"/>

  <line x1="190" y1="115" x2="220" y2="115" class="wire"/>
  <text x="195" y="108" class="small">+5V</text>
  <line x1="220" y1="115" x2="330" y2="115" class="wire"/>

  <!-- RECEIVER SECTION -->
  <!-- Solar panel symbol -->
  <rect x="330" y="60" width="90" height="60" fill="#ffffff" stroke="#222222" stroke-width="2"/>
  <line x1="335" y1="70" x2="415" y2="70" class="wire" stroke-width="1"/>
  <line x1="335" y1="85" x2="415" y2="85" class="wire" stroke-width="1"/>
  <line x1="335" y1="100" x2="415" y2="100" class="wire" stroke-width="1"/>
  <line x1="350" y1="60" x2="350" y2="120" class="wire" stroke-width="1"/>
  <line x1="375" y1="60" x2="375" y2="120" class="wire" stroke-width="1"/>
  <line x1="400" y1="60" x2="400" y2="120" class="wire" stroke-width="1"/>
  <text x="320" y="145" class="small">SOLAR PANEL</text>
  <text x="335" y="80" class="small">−</text>
  <text x="335" y="112" class="small">+</text>

  <line x1="330" y1="70" x2="300" y2="70" class="wire"/>
  <line x1="300" y1="30" x2="300" y2="180" class="wire"/>
  <text x="270" y="45" class="small">+5V(GND ref)</text>

  <!-- GND symbol near panel -->
  <line x1="345" y1="60" x2="345" y2="40" class="wire"/>
  <line x1="332" y1="40" x2="358" y2="40" class="wire"/>
  <line x1="337" y1="34" x2="353" y2="34" class="wire"/>
  <line x1="342" y1="28" x2="348" y2="28" class="wire"/>

  <!-- Potentiometer -->
  <rect x="300" y="200" width="30" height="90" class="box"/>
  <text x="245" y="200" class="small">100k</text>
  <line x1="315" y1="200" x2="315" y2="170" class="wire"/>
  <line x1="315" y1="170" x2="450" y2="170" class="wire"/>
  <text x="330" y="180" class="small">+5V</text>
  <polygon points="330,245 345,240 345,250" fill="#222222"/>

  <!-- Amplifier -->
  <rect x="480" y="60" width="150" height="150" class="box"/>
  <text x="500" y="80" class="label" font-size="13">PAM8403</text>
  <text x="500" y="95" class="small">AMPLIFIER</text>
  <text x="490" y="120" class="small">IN.L</text>
  <text x="490" y="135" class="small">IN.COM</text>
  <text x="490" y="150" class="small">IN.R</text>
  <text x="490" y="170" class="small">+5V</text>
  <text x="490" y="190" class="small">GND</text>
  <text x="590" y="120" class="small">OUT.L-</text>
  <text x="590" y="135" class="small">OUT.L+</text>
  <text x="590" y="155" class="small">OUT.R-</text>
  <text x="590" y="170" class="small">OUT.R+</text>

  <!-- pot wiper to amp in -->
  <line x1="345" y1="245" x2="480" y2="120" class="wire"/>

  <!-- +5V to amp -->
  <line x1="480" y1="170" x2="450" y2="170" class="wire"/>
  <line x1="450" y1="170" x2="450" y2="30" class="wire"/>
  <line x1="450" y1="30" x2="300" y2="30" class="wire"/>

  <!-- amp GND -->
  <line x1="480" y1="190" x2="460" y2="190" class="wire"/>
  <line x1="460" y1="190" x2="460" y2="290" class="wire"/>
  <line x1="315" y1="290" x2="460" y2="290" class="wire"/>
  <line x1="447" y1="310" x2="473" y2="310" class="wire"/>
  <line x1="460" y1="290" x2="460" y2="310" class="wire"/>
  <line x1="452" y1="316" x2="468" y2="316" class="wire"/>
  <line x1="457" y1="322" x2="463" y2="322" class="wire"/>

  <!-- Speaker -->
  <circle cx="800" cy="130" r="45" class="box"/>
  <circle cx="800" cy="130" r="25" fill="none" stroke="#222222" stroke-width="1.5"/>
  <text x="765" y="100" class="small">SPEAKER</text>
  <text x="740" y="115" class="small">−</text>
  <text x="740" y="145" class="small">+</text>

  <line x1="630" y1="120" x2="740" y2="115" class="wire"/>
  <line x1="630" y1="135" x2="740" y2="145" class="wire"/>

  <!-- unused OUT.R marked with X -->
  <line x1="618" y1="150" x2="628" y2="160" class="wire"/>
  <line x1="628" y1="150" x2="618" y2="160" class="wire"/>
  <line x1="618" y1="165" x2="628" y2="175" class="wire"/>
  <line x1="628" y1="165" x2="618" y2="175" class="wire"/>
</svg>
